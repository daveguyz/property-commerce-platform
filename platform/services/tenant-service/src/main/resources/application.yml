spring:
  application:
    name: tenant-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pcp_tenants}
    username: ${DB_USER:pcp}
    password: ${DB_PASSWORD:pcp_secret}
  jpa:
    hibernate:
      ddl-auto: validate
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${PORT:8096}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
