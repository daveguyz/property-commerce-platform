<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Your question has been answered</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; margin: 0; padding: 0; }
    .container { max-width: 580px; margin: 0 auto; padding: 32px 16px; }
    .card { background: #ffffff; border-radius: 12px; padding: 32px; border: 1px solid #e5e7eb; }
    .question-box { background: #f3f4f6; border-left: 3px solid #6366f1; border-radius: 6px; padding: 12px 16px; margin: 12px 0; font-size: 14px; color: #6b7280; }
    .answer-box   { background: #f0fdf4; border-left: 3px solid #22c55e; border-radius: 6px; padding: 14px 16px; margin: 12px 0; font-size: 15px; }
    .btn { display: inline-block; padding: 12px 24px; background: #6366f1; color: #ffffff; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 15px; margin-top: 20px; }
    h2 { margin: 0 0 6px; font-size: 22px; }
    p { color: #374151; line-height: 1.6; }
    .footer { font-size: 12px; color: #9ca3af; text-align: center; margin-top: 24px; }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h2>Your question has been answered</h2>
    <p>The auctioneer has replied to your question on <strong th:text="${lotTitle}">Lot Title</strong>.</p>

    <p><strong>Your question:</strong></p>
    <div class="question-box" th:text="${questionContent}">Your question…</div>

    <p><strong>Answer from the auctioneer:</strong></p>
    <div class="answer-box" th:text="${response}">The answer…</div>

    <p>Return to the auction room to continue bidding.</p>

    <a th:href="${auctionRoomUrl}" class="btn">Return to auction →</a>
  </div>
  <div class="footer">
    <p>StaySphere AOS &bull; This answer was sent privately to you only.</p>
  </div>
</div>
</body>
</html>
