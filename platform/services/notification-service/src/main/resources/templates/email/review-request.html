<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Leave a Review</title>
<style>
  body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; }
  .container { max-width: 600px; margin: 40px auto; background: #fff; border-radius: 12px; overflow: hidden; }
  .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 40px 32px; text-align: center; }
  .header h1 { color: #f0b429; margin: 0; font-size: 26px; }
  .body { padding: 32px; text-align: center; }
  .stars { font-size: 40px; margin: 16px 0; }
  .cta-btn { display: inline-block; background: #f0b429; color: #1a1a2e; text-decoration: none; padding: 14px 32px; border-radius: 8px; font-weight: bold; font-size: 16px; margin: 24px 0; }
  .footer { background: #f8f9fa; padding: 20px; text-align: center; color: #888; font-size: 12px; }
</style>
</head>
<body>
<div class="container">
  <div class="header"><h1 th:text="${brandName}">StaySphere</h1></div>
  <div class="body">
    <div class="stars">⭐⭐⭐⭐⭐</div>
    <h2>How was your stay at <span th:text="${propertyName}">the property</span>?</h2>
    <p>Your honest review helps other travellers and supports our hosts.</p>
    <a th:href="${reviewUrl}" class="cta-btn">Write Your Review</a>
    <p style="color:#888;font-size:13px;">Takes less than 2 minutes. Thank you for being part of StaySphere!</p>
  </div>
  <div class="footer"><p>&copy; <span th:text="${year}">2025</span> <span th:text="${brandName}">StaySphere</span></p></div>
</div>
</body>
</html>
