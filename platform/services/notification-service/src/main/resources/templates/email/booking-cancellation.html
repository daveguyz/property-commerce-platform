<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Booking Cancelled</title>
<style>
  body{font-family:Arial,sans-serif;background:#f5f5f5;margin:0}
  .container{max-width:600px;margin:40px auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.08)}
  .header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:40px 32px;text-align:center}
  .header h1{color:#f0b429;margin:0;font-size:26px}
  .body{padding:32px}
  .info-box{background:#f8f9fa;border-left:4px solid #6b7280;border-radius:6px;padding:16px 20px;margin:16px 0}
  .refund-box{background:#f0fdf4;border-left:4px solid #10b981;border-radius:6px;padding:16px 20px;margin:16px 0}
  .footer{background:#f8f9fa;padding:20px 32px;text-align:center;color:#888;font-size:12px}
</style>
</head>
<body>
<div class="container">
  <div class="header"><h1 th:text="${brandName}">StaySphere</h1><p style="color:#aab4c4;margin:8px 0 0">Booking Cancelled</p></div>
  <div class="body">
    <p>Hi <strong th:text="${guestName}">Guest</strong>,</p>
    <p>Your booking has been cancelled.</p>
    <div class="info-box">
      <p><strong>Booking:</strong> <span th:text="${bookingId}">ABC-123</span></p>
      <p><strong>Property:</strong> <span th:text="${propertyName}">Property Name</span></p>
      <p th:if="${cancellationReason != null}"><strong>Reason:</strong> <span th:text="${cancellationReason}">Reason</span></p>
    </div>
    <div class="refund-box" th:if="${refundAmount != null}">
      <p><strong>Refund:</strong> <span th:text="${currency + ' ' + refundAmount}">NAD 1500.00</span> will be returned to your original payment method within 5–10 business days.</p>
    </div>
    <p style="color:#888;font-size:13px">Questions? Contact us at support@staysphere.com</p>
  </div>
  <div class="footer"><p>&copy; <span th:text="${year}">2025</span> <span th:text="${brandName}">StaySphere</span></p></div>
</div>
</body>
</html>
