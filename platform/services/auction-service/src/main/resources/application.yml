spring:
  application:
    name: auction-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5442/propertycommerce_auction}
    username: ${DB_USERNAME:propertycommerce}
    password: ${DB_PASSWORD:propertycommerce_secret}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: auction-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.propertycommerce.*"

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
    elasticsearch:
      repositories:
        enabled: false   # auction-service does not own ES — search-service does

server:
  port: ${PORT:8094}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

propertycommerce:
  jwt:
    secret: ${JWT_SECRET:base64_encoded_256_bit_secret_key_replace_in_production}
  frontend:
    url: ${FRONTEND_URL:https://propertycommerce-aos.myshopify.com}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  kyc-webhook-secret: ${STRIPE_KYC_WEBHOOK_SECRET:}

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:}


mux:
  token-id: ${MUX_TOKEN_ID:}
  token-secret: ${MUX_TOKEN_SECRET:}

logging:
  level:
    com.propertycommerce.auctionservice: INFO
    org.springframework.websocket: WARN

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    try-it-out-enabled: true
