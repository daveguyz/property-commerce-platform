global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'property-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['property-service:8081']

  - job_name: 'booking-engine'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['booking-engine:8082']

  - job_name: 'payment-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['payment-service:8083']

  - job_name: 'ai-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ai-service:8084']

  - job_name: 'pricing-engine'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['pricing-engine:8085']

  - job_name: 'trust-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['trust-service:8086']

  - job_name: 'notification-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['notification-service:8087']

  - job_name: 'search-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['search-service:8088']
