spring:
  application:
    name: shopify-integration

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/staysphere}
    username: ${DB_USERNAME:staysphere}
    password: ${DB_PASSWORD:staysphere_secret}
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: shopify-integration-group
      auto-offset-reset: earliest

server:
  port: ${PORT:8090}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

shopify:
  store-url: ${SHOPIFY_STORE_URL:https://your-store.myshopify.com}
  access-token: ${SHOPIFY_ACCESS_TOKEN:your_admin_token}
  storefront-token: ${SHOPIFY_STOREFRONT_TOKEN:your_storefront_token}
  webhook-secret: ${SHOPIFY_WEBHOOK_SECRET:your_webhook_secret}
  api:
    key: ${SHOPIFY_API_KEY:}
    secret: ${SHOPIFY_API_SECRET:}
    version: "2024-01"
  oauth:
    scopes: "read_products,write_products,read_themes,write_themes,read_customers,write_customers,read_orders,write_orders,write_draft_orders,read_script_tags,write_script_tags"
    redirect-uri: ${SHOPIFY_OAUTH_REDIRECT_URI:https://app.staysphere.com/oauth/shopify/callback}

staysphere:
  app:
    name: "StaySphere AOS"
    api-gateway-url: ${API_GATEWAY_URL:}
  frontend:
    url: ${FRONTEND_URL:https://staysphere-aos.myshopify.com}
