<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Payment deadline approaching</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f9fafb;margin:0;padding:0}
  .c{max-width:580px;margin:0 auto;padding:32px 16px}
  .card{background:#fff;border-radius:12px;padding:32px;border:1px solid #e5e7eb}
  .warn{background:#fffbeb;border:1.5px solid #f59e0b;border-radius:8px;padding:14px 16px;margin:16px 0;font-size:14px;color:#92400e}
  .btn{display:inline-block;padding:12px 24px;background:#6366f1;color:#fff;border-radius:8px;text-decoration:none;font-weight:700;font-size:15px;margin-top:16px}
  h2{margin:0 0 6px;font-size:22px} p{color:#374151;line-height:1.6}
  .foot{font-size:12px;color:#9ca3af;text-align:center;margin-top:24px}
</style></head>
<body><div class="c"><div class="card">
  <h2>⏰ Payment deadline in 48 hours</h2>
  <p>This is a reminder that the balance payment for <strong th:text="${lotTitle}">Lot</strong> is due by <strong th:text="${paymentDeadline}">–</strong>.</p>
  <div class="warn">⚠️ Failure to pay by the deadline will result in your deposit being forfeited and the lot being offered to the next bidder.</div>
  <p>Balance due: <strong th:text="${currency + ' ' + balanceDue}">–</strong></p>
  <a th:href="${accountUrl}" class="btn">View payment details →</a>
</div><div class="foot"><p>StaySphere AOS · Auction Rule 9.1</p></div></div></body></html>
