spring:
  application:
    name: search-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  elasticsearch:
    uris: ${ELASTICSEARCH_URL:http://localhost:9200}
    username: ${ES_USER:elastic}
    password: ${ES_PASSWORD:elastic_password}
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    consumer:
      group-id: search-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.staysphere.shared.events"

server:
  port: ${PORT:8088}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

staysphere:
  jwt:
    secret: ${JWT_SECRET:base64_encoded_256_bit_secret_key_replace_in_production}

  flyway:
    enabled: false
