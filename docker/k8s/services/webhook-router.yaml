# webhook-router — Deployment + Service + HorizontalPodAutoscaler
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-router
  namespace: pcp
  labels: { app: webhook-router }
spec:
  replicas: 1
  selector:
    matchLabels: { app: webhook-router }
  template:
    metadata:
      labels: { app: webhook-router }
    spec:
      containers:
        - name: webhook-router
          image: ghcr.io/daveguyz/property-commerce-platform/webhook-router:latest
          ports:
            - containerPort: 8095
          envFrom:
            - configMapRef: { name: pcp-common-config }
            - secretRef:    { name: pcp-secrets }
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits:   { cpu: "1",  memory: 1Gi }
          livenessProbe:
            httpGet: { path: /actuator/health/liveness,  port: 8095 }
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8095 }
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-router
  namespace: pcp
spec:
  selector: { app: webhook-router }
  ports:
    - port: 8095
      targetPort: 8095
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: webhook-router
  namespace: pcp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: webhook-router
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
