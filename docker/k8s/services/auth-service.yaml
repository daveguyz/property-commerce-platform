# auth-service — Deployment + Service + HorizontalPodAutoscaler
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: pcp
  labels: { app: auth-service }
spec:
  replicas: 2
  selector:
    matchLabels: { app: auth-service }
  template:
    metadata:
      labels: { app: auth-service }
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/daveguyz/property-commerce-platform/auth-service:latest
          ports:
            - containerPort: 8091
          envFrom:
            - configMapRef: { name: pcp-common-config }
            - secretRef:    { name: pcp-secrets }
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits:   { cpu: "1",  memory: 1Gi }
          livenessProbe:
            httpGet: { path: /actuator/health/liveness,  port: 8091 }
            initialDelaySeconds: 60
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8091 }
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: pcp
spec:
  selector: { app: auth-service }
  ports:
    - port: 8091
      targetPort: 8091
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: auth-service
  namespace: pcp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: auth-service
  minReplicas: 2
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
