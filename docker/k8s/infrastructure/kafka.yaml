# Kafka in KRaft mode (no ZooKeeper) — single broker for dev/small.
# Production: use a managed Kafka (Confluent Cloud, MSK, Redpanda Cloud).
apiVersion: apps/v1
kind: StatefulSet
metadata: { name: kafka, namespace: pcp }
spec:
  serviceName: kafka
  replicas: 1
  selector: { matchLabels: { app: kafka } }
  template:
    metadata: { labels: { app: kafka } }
    spec:
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:7.6.0
          ports: [{ containerPort: 9092 }]
          env:
            - { name: KAFKA_NODE_ID, value: "1" }
            - { name: KAFKA_PROCESS_ROLES, value: "broker,controller" }
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "1@kafka-0.kafka:9093" }
            - { name: KAFKA_LISTENERS, value: "PLAINTEXT://:9092,CONTROLLER://:9093" }
            - { name: KAFKA_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka:9092" }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: CLUSTER_ID, value: "pcp-kafka-cluster-01" }
          volumeMounts:
            - { name: data, mountPath: /var/lib/kafka/data }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 10Gi } }
---
apiVersion: v1
kind: Service
metadata: { name: kafka, namespace: pcp }
spec:
  selector: { app: kafka }
  ports:
    - { name: broker, port: 9092 }
    - { name: controller, port: 9093 }
  clusterIP: None
