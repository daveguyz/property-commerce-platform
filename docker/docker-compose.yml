# Property Commerce Platform — Full local dev stack
# Usage: docker compose -f docker/docker-compose.yml up -d
version: '3.9'

services:
  # ── Infrastructure ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pcp-postgres
    environment:
      POSTGRES_USER: pcp
      POSTGRES_PASSWORD: pcp_secret
      POSTGRES_DB: pcp_dev
    ports:
      - '5432:5432'
    volumes:
      - pcp-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'pcp']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pcp-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: pcp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ['CMD', 'echo', 'ruok', '|', 'nc', 'localhost', '2181']
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: pcp-kafka
    depends_on: [zookeeper]
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ['CMD', 'kafka-topics', '--bootstrap-server', 'localhost:9092', '--list']
      interval: 15s
      timeout: 10s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: pcp-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - 'ES_JAVA_OPTS=-Xms512m -Xmx512m'
    ports:
      - '9200:9200'
    volumes:
      - pcp-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9200/_cluster/health || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Platform Infrastructure ──────────────────────────────────
  service-discovery:
    build:
      context: ..
      dockerfile: platform/infrastructure/service-discovery/Dockerfile
    container_name: pcp-eureka
    ports:
      - '8761:8761'
    environment:
      SPRING_PROFILES_ACTIVE: dev

  config-server:
    build:
      context: ..
      dockerfile: platform/infrastructure/config-server/Dockerfile
    container_name: pcp-config
    ports:
      - '8888:8888'
    depends_on: [service-discovery]
    environment:
      SPRING_PROFILES_ACTIVE: dev
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-discovery:8761/eureka

  api-gateway:
    build:
      context: ..
      dockerfile: platform/infrastructure/api-gateway/Dockerfile
    container_name: pcp-gateway
    ports:
      - '8080:8080'
    depends_on: [config-server, redis]
    environment:
      SPRING_PROFILES_ACTIVE: dev
      CONFIG_SERVER_URL: http://config-server:8888
      JWT_SECRET: ${JWT_SECRET:-ZGV2LWxvY2FsLXNlY3JldC1rZXktbm90LWZvci1wcm9kdWN0aW9u}
      REDIS_HOST: redis

volumes:
  pcp-postgres-data:
  pcp-es-data:

networks:
  default:
    name: pcp-network
