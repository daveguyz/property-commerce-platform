# ============================================================
# SDK Release — triggered by tags like sdk-v2.1.0
# Builds the bundle, publishes to npm, uploads versioned files
# to the CDN bucket, and attaches artifacts to a GitHub Release.
# ============================================================
name: SDK Release

on:
  push:
    tags: ['sdk-v*']

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # create the GitHub Release
      id-token: write   # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#sdk-v}" >> "$GITHUB_OUTPUT"

      - name: Sync package.json version to tag
        working-directory: sdk
        run: npm version ${{ steps.ver.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Install & build
        working-directory: sdk
        run: |
          npm ci
          npx vite build

      - name: Validate types
        working-directory: sdk
        run: npx tsc --noEmit --strict types/index.d.ts

      - name: Publish to npm
        working-directory: sdk
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload to CDN (Cloudflare R2)
        # Versioning scheme served by the CDN:
        #   /sdk/v2/pcp.min.js       latest 2.x   (mutable)
        #   /sdk/v2.1/pcp.min.js     latest 2.1.x (mutable)
        #   /sdk/v2.1.0/pcp.min.js   exact        (immutable)
        run: |
          V=${{ steps.ver.outputs.version }}
          MAJOR=${V%%.*}
          MINOR=${V%.*}
          pip install awscli -q
          for PREFIX in "v$MAJOR" "v$MINOR" "v$V"; do
            aws s3 cp sdk/dist/ "s3://pcp-cdn/sdk/$PREFIX/" --recursive \
              --endpoint-url "$R2_ENDPOINT" \
              --cache-control "$([ "$PREFIX" = "v$V" ] && echo 'public,max-age=31536000,immutable' || echo 'public,max-age=3600')"
          done
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT:           ${{ secrets.R2_ENDPOINT }}
        continue-on-error: true   # CDN optional until R2 secrets configured

      - name: GitHub Release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: SDK ${{ steps.ver.outputs.version }}
          files: |
            sdk/dist/pcp.min.js
            sdk/dist/pcp.esm.js
            sdk/dist/pcp.cjs.js
