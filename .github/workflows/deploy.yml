# ============================================================
# StaySphere AOS — Deploy Pipeline
# Builds Docker images and deploys to Railway / Render.
# Triggered on main branch push after CI passes.
# ============================================================
name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  JAVA_VERSION: '21'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/staysphere-aos

jobs:
  # ── Package theme files into shopify-integration ────────────
  bundle-theme:
    name: Bundle theme into shopify-integration
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Checkout theme branch into theme-files/
        run: |
          git fetch origin theme
          git archive origin/theme | \
            tar -x -C shopify-integration/src/main/resources/theme-files/
          echo "Theme files:"
          find shopify-integration/src/main/resources/theme-files -type f | wc -l

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build shopify-integration with theme files bundled
        run: |
          ./mvnw package -pl shopify-integration -am -DskipTests -q
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Upload shopify-integration JAR
        uses: actions/upload-artifact@v4
        with:
          name: shopify-integration-jar
          path: shopify-integration/target/*.jar
          retention-days: 3

  # ── Build & push Docker images ──────────────────────────────
  build-images:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: bundle-theme
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    strategy:
      matrix:
        service:
          - auction-service
          - auth-service
          - booking-engine
          - property-service
          - payment-service
          - notification-service
          - messaging-service
          - search-service
          - analytics-service
          - api-gateway
          - shopify-integration

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        run: |
          SERVICE=${{ matrix.service }}
          # Determine Dockerfile location
          if [ "$SERVICE" = "api-gateway" ]; then
            CONTEXT="."
            DOCKERFILE="infrastructure/api-gateway/Dockerfile"
          elif [ "$SERVICE" = "shopify-integration" ]; then
            CONTEXT="."
            DOCKERFILE="shopify-integration/Dockerfile"
          else
            CONTEXT="."
            DOCKERFILE="services/$SERVICE/Dockerfile"
          fi

          docker buildx build \
            --platform linux/amd64 \
            --cache-from type=gha,scope=$SERVICE \
            --cache-to type=gha,scope=$SERVICE,mode=max \
            --file "$DOCKERFILE" \
            --tag "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/$SERVICE:${{ github.sha }}" \
            --tag "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/$SERVICE:latest" \
            --push \
            "$CONTEXT"

  # ── Deploy to Railway ────────────────────────────────────────
  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build-images
    environment: production
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy all services
        run: |
          # Deploy each service. Railway uses RAILWAY_TOKEN for auth.
          # Each service is a separate Railway service within the project.
          for SERVICE in auction-service auth-service booking-engine \
                         property-service payment-service notification-service \
                         messaging-service search-service analytics-service \
                         api-gateway shopify-integration; do
            echo "Deploying $SERVICE..."
            railway up --service "$SERVICE" --detach || echo "Warning: $SERVICE deploy failed"
          done
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        continue-on-error: true  # Non-blocking until Railway project is configured
