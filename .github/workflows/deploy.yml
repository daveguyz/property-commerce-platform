# ============================================================
# Property Commerce Platform — Deploy Pipeline
# Builds Docker images per service and pushes to GHCR.
# Triggered after CI passes on main.
# ============================================================
name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  JAVA_VERSION: '21'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/property-commerce-platform

jobs:
  build-images:
    name: Build ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: auction-service,     path: platform/services/auction-service }
          - { name: auth-service,        path: platform/services/auth-service }
          - { name: booking-engine,      path: platform/services/booking-engine }
          - { name: property-service,    path: platform/services/property-service }
          - { name: payment-service,     path: platform/services/payment-service }
          - { name: notification-service,path: platform/services/notification-service }
          - { name: messaging-service,   path: platform/services/messaging-service }
          - { name: search-service,      path: platform/services/search-service }
          - { name: analytics-service,   path: platform/services/analytics-service }
          - { name: trust-service,       path: platform/services/trust-service }
          - { name: ai-service,          path: platform/services/ai-service }
          - { name: api-gateway,         path: platform/infrastructure/api-gateway }

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '${{ env.JAVA_VERSION }}', distribution: temurin, cache: maven }
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build JAR
        run: |
          mvn install \
            -pl platform/shared/common-dto,platform/shared/common-events,platform/shared/common-security \
            -am -DskipTests -q
          mvn package -pl ${{ matrix.service.path }} -am -DskipTests -q
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}

      - name: Build & push Docker image — ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.path }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,scope=${{ matrix.service.name }},mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}:latest

  # ── Deploy to Railway ────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build-images
    environment: production
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy services
        run: |
          for SERVICE in auction-service auth-service booking-engine \
                         property-service payment-service notification-service \
                         messaging-service search-service analytics-service \
                         api-gateway; do
            echo "Deploying $SERVICE..."
            railway up --service "$SERVICE" --detach || echo "⚠ $SERVICE deploy failed (non-blocking)"
          done
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        continue-on-error: true
