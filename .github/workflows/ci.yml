# ============================================================
# Property Commerce Platform — CI Pipeline
# Runs on every push to main and every PR targeting main.
# Services are built independently so failures are isolated.
# ============================================================
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: '-Xmx2g -XX:+UseG1GC'

jobs:
  # ── Shared module validation ──────────────────────────────────
  shared:
    name: Shared modules
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '${{ env.JAVA_VERSION }}', distribution: temurin, cache: maven }

      - name: Build shared modules
        run: |
          mvn install \
            -pl platform/shared/common-dto,platform/shared/common-events,platform/shared/common-security \
            -am -DskipTests -q

      - name: Validate all pom.xml files
        run: |
          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET, glob, sys
          errors = []
          for p in glob.glob('**/pom.xml', recursive=True):
              try: ET.parse(p)
              except ET.ParseError as e: errors.append(f'{p}: {e}')
          if errors:
              for e in errors: print(f'ERROR: {e}')
              sys.exit(1)
          print(f'✅ All {len(glob.glob("**/pom.xml", recursive=True))} pom.xml files valid')
          PYEOF

  # ── Per-service build matrix ──────────────────────────────────
  services:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: shared

    strategy:
      fail-fast: false   # all services run even if one fails
      matrix:
        service:
          - platform/services/auction-service
          - platform/services/auth-service
          - platform/services/booking-engine
          - platform/services/property-service
          - platform/services/payment-service
          - platform/services/notification-service
          - platform/services/messaging-service
          - platform/services/search-service
          - platform/services/analytics-service
          - platform/services/trust-service
          - platform/services/ai-service
          - platform/services/pricing-engine
          - platform/infrastructure/api-gateway

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pcp_test
          POSTGRES_USER: pcp
          POSTGRES_PASSWORD: pcp_secret
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '${{ env.JAVA_VERSION }}', distribution: temurin, cache: maven }

      - name: Build shared (cached)
        run: |
          mvn install \
            -pl platform/shared/common-dto,platform/shared/common-events,platform/shared/common-security \
            -am -DskipTests -q

      - name: Build + test ${{ matrix.service }}
        run: |
          mvn verify -pl ${{ matrix.service }} -am \
            --batch-mode -q \
            -Dspring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration \
            -Dspring.data.elasticsearch.repositories.enabled=false
        env:
          JWT_SECRET: dGVzdC1zZWNyZXQtZm9yLWNpLXBpcGVsaW5lLW9ubHk=
          STRIPE_SECRET_KEY: sk_test_ci_stub
          ANTHROPIC_API_KEY: ''

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.service }}
          path: ${{ matrix.service }}/target/surefire-reports/*.xml
          retention-days: 7
          if-no-files-found: ignore

  # ── SDK JavaScript validation ─────────────────────────────────
  sdk:
    name: SDK validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm }

      - name: Install SDK deps (if package.json exists)
        run: |
          if [ -f sdk/package.json ]; then
            cd sdk && npm ci
          else
            echo "sdk/package.json not yet created — skipping"
          fi

      - name: Validate JavaScript syntax
        run: |
          if [ -d sdk/packages ]; then
            find sdk/packages -name "*.js" | while read f; do
              node --check "$f" || exit 1
            done
            echo "✅ SDK JS files valid"
          else
            echo "No SDK packages yet — skipping"
          fi

  # ── Security scan ─────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '${{ env.JAVA_VERSION }}', distribution: temurin, cache: maven }

      - name: Check for hardcoded secrets
        run: |
          STRIPE_LIVE="sk_live_"
          STRIPE_PK="pk_live_"
          if grep -r "$STRIPE_LIVE\|$STRIPE_PK" \
               --include="*.java" --include="*.yml" --include="*.yaml" \
               --exclude-dir=".git" --exclude="ci.yml" --exclude="deploy.yml" .; then
            echo "ERROR: Potential hardcoded production credentials found"
            exit 1
          fi
          echo "✅ No hardcoded production credentials found"

      - name: OWASP dependency check
        run: |
          mvn install \
            -pl platform/shared/common-dto,platform/shared/common-events,platform/shared/common-security \
            -am -DskipTests -q
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            --batch-mode -q \
            -pl platform/services/auction-service -am
        continue-on-error: true
